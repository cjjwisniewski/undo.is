section-title: Professional Experience
content:
  - company: Crown Castle
    location: Canonsburg, PA
    title: Senior Cloud Platform Engineer
    dates: March 2024 to Present
    #description:
    #  Architect and build Crown Castle's cloud platform, prioritizing security and scalability. Implement CI/CD processes to improve engineering efficiency. Foster technology innovation through 
    #  proof-of-concept development and research. Manage platform risks and adapt solutions to support rapid business growth.
    description-bullets:
      - bullet: Orchestrated the architectural decoupling of cloud platforms and applications into three independent entities, ensuring zero downtime and maintaining security compliance throughout the corporate divestment process.
      - bullet: Architected and deployed the organization's inaugural external-facing REST API utilizing Amazon API Gateway, establishing a robust, scalable foundation for secure customer-facing integrations.
      - bullet: Established a technical lead program within the Platform Engineering team to formalize mentorship and knowledge sharing, resulting in accelerated project delivery and improved team efficiency.
      - bullet: Developed and implemented a comprehensive requirements framework for all platform services, standardizing the project intake process to improve organizational transparency.
      - bullet: Founded and directed a cloud platform training program that standardized organizational technical proficiency and accelerated enterprise-wide cloud adoption initiatives.
  - title: Cloud Platform Engineer III
    dates: June 2022 to March 2024
    #description:
    #  Architected and developed cloud-native microservices, adhering to security and architectural best practices. Drove technology innovation through POCs and collaboration with development teams, ensuring platform alignment with Agile methodologies.
    description-bullets:
      - bullet: Directed the implementation of Teleport for AWS to transform privileged access management, successfully eliminating all permanently elevated identities and reducing the internal attack surface.
      - bullet: Engineered a secure, automated Terraform CI/CD pipeline integrated with Checkov to enforce code quality and security compliance across all infrastructure deployments.
      - bullet: Orchestrated the transition of critical infrastructure and applications from Microsoft Azure to Amazon Web Services, delivering enhanced reliability and optimized cost efficiency.
      - bullet: Integrated automated tag validation within CD pipelines to enforce ServiceNow CMDB standards, significantly improving cloud cost visibility and chargeback accuracy.
  - title: Systems Engineer III
    dates: July 2020 to June 2022
    #description:
    #  Architected and managed Azure and on-premise virtualization infrastructure for a 5,000+ employee enterprise. Implemented automated workflows, optimized Office 365, and maintained server compliance with corporate standards. 
    description-bullets:
      - bullet: Architected and managed a multi-region Azure environment for a 5,000+ employee enterprise using Infrastructure as Code (IaC) with Terraform to eliminate configuration drift.
      - bullet: Enforced industry-standard security controls including CIS and SOX across hybrid cloud environments, optimizing audit readiness and maintaining a robust compliance posture.
      - bullet: Deployed enterprise-grade monitoring and alerting solutions to optimize infrastructure performance and ensure maximum availability of mission-critical services.
      - bullet: Administered complex Active Directory and Office 365 environments, including Teams and Exchange Online, to support seamless enterprise communication.
  - title: Senior Desktop Analyst<br>Desktop Analyst
    dates: May 2018 to July 2020<br>August 2017 to May 2018
    #description:
    #  Managed and administered workstations across a 6,000+ device environment, ensuring optimal end-user experience and security. Drove technology adoption through evaluation, piloting, and project management. Maintained workstation configurations while providing training and mentorship to support staff.
    description-bullets:
      - bullet: Managed and standardized workstation configurations for a 6,000+ device environment, utilizing SCCM to reduce support incidents and enhance endpoint security.
      - bullet: Consolidated operating system deployment processes by migrating from MDT to SCCM, streamlining management workflows and eliminating redundant infrastructure.
      - bullet: Ensured endpoint security and compliance by automating the deployment of critical Windows and third-party software updates across the entire device fleet.
      - bullet: Contributed to the architecture and implementation of the corporate Citrix environment while providing ongoing operational support for end-user virtualization.
      - bullet: Automated key deployment and departmental processes via scripting, significantly increasing the productivity and operational efficiency of the Client Services team.
  - company: Carlow University
    location: Pittsburgh, PA
    title: Computer and Media Specialist
    dates: June 2014 to August 2017
    #description:
    #  Managed incident resolution and production system administration for the university community. Contributed to technology enhancements by implementing new hardware and software solutions.
    description-bullets:
      - bullet: Implemented and maintained Windows Deployment Services to replace legacy PC build processes, achieving a 50 percent reduction in build times for the university community.
      - bullet: Led the implementation of a Dell KACE environment to centralize software updates, service desk operations, and asset management across multiple departments.
      - bullet: Architected and implemented a modernized Pharos Print Management system that significantly reduced administrative and billing costs while improving the student end-user experience.
  - company: Saint Vincent College
    location: Latrobe, PA
    title: Senior Service Desk Technician
    dates: August 2010 to May 2014
    #description: 
    #  Leveraged ITIL best practices to deliver exceptional customer service. Managed incident resolution for faculty, staff, and students, restoring services within SLA guidelines.
    description-bullets:
      - bullet: Leveraged ITIL best practices to manage high-volume incident resolution, consistently restoring critical services within defined SLA guidelines for faculty, staff, and students.