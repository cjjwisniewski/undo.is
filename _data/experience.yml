section-title: Professional Experience
content:
  - company: Crown Castle
    location: Canonsburg, PA
    title: Senior Cloud Platform Engineer
    dates: March 2024 to Present
    #description:
    #  Architect and build Crown Castle's cloud platform, prioritizing security and scalability. Implement CI/CD processes to improve engineering efficiency. Foster technology innovation through 
    #  proof-of-concept development and research. Manage platform risks and adapt solutions to support rapid business growth.
    description-bullets:
      - bullet: Led the architectural separation of a shared enterprise cloud platform into three independently governed environments during a corporate divestment, defining IAM boundaries, network isolation, data ownership, and migration sequencing to eliminate cross-entity blast radius while maintaining zero downtime.
      - bullet: Designed and delivered the organization’s first external-facing API platform using Amazon API Gateway, establishing secure patterns for authentication, authorization, rate limiting, and customer integration at scale.
      - bullet: Defined a standardized platform requirements and intake framework, transforming ad-hoc infrastructure requests into a predictable, auditable delivery model aligned with security and compliance controls.
      - bullet: Founded and led an internal cloud platform enablement program to scale platform knowledge across engineering teams, reducing reliance on the platform team and accelerating adoption of standardized cloud patterns.
      - bullet: Established a technical leadership program within the platform organization to formalize mentorship, architectural review, and knowledge sharing, improving delivery consistency across initiatives.
  - title: Cloud Platform Engineer III
    dates: June 2022 to March 2024
    #description:
    #  Architected and developed cloud-native microservices, adhering to security and architectural best practices. Drove technology innovation through POCs and collaboration with development teams, ensuring platform alignment with Agile methodologies.
    description-bullets:
      - bullet: Redefined the organization’s privileged access model by eliminating standing credentials across AWS environments, designing a short-lived, identity-aware access architecture using Teleport that materially reduced lateral movement risk and improved audit posture.
      - bullet: Designed a standardized infrastructure delivery platform using Terraform, CI/CD pipelines, and policy-as-code (Checkov), enabling teams to self-service compliant infrastructure while preventing non-conformant deployments by default.
      - bullet: Led the architectural decision and execution to migrate critical infrastructure and workloads from Azure to AWS, balancing cost, reliability, security posture, and operational maturity.
      - bullet: Integrated automated tag validation and governance into CI/CD pipelines to enforce CMDB standards, significantly improving cloud cost attribution, chargeback accuracy, and financial visibility.
  - title: Systems Engineer III
    dates: July 2020 to June 2022
    #description:
    #  Architected and managed Azure and on-premise virtualization infrastructure for a 5,000+ employee enterprise. Implemented automated workflows, optimized Office 365, and maintained server compliance with corporate standards. 
    description-bullets:
      - bullet: Architected and managed a multi-region Azure environment for a 5,000+ employee enterprise using Infrastructure as Code (IaC) with Terraform to eliminate configuration drift and establish repeatable deployment patterns.
      - bullet: Defined and enforced CIS and SOX-aligned security controls across hybrid environments, improving audit readiness and reducing compliance risk.
      - bullet: Designed enterprise monitoring and alerting strategies to improve reliability and reduce mean time to detection for critical services.
      - bullet: Owned complex identity and collaboration infrastructure including Active Directory, Office 365, Exchange Online, and Teams.
  - title: Senior Desktop Analyst<br>Desktop Analyst
    dates: May 2018 to July 2020<br>August 2017 to May 2018
    #description:
    #  Managed and administered workstations across a 6,000+ device environment, ensuring optimal end-user experience and security. Drove technology adoption through evaluation, piloting, and project management. Maintained workstation configurations while providing training and mentorship to support staff.
    description-bullets:
      - bullet: Standardized endpoint configurations and deployment pipelines across 6,000+ devices using SCCM, reducing incident rates and improving security posture.
      - bullet: Led migration from MDT to SCCM for operating system deployments, simplifying management workflows and eliminating redundant infrastructure.
      - bullet: Contributed to the design and operation of the corporate Citrix environment supporting enterprise virtualization needs.
  - company: Carlow University
    location: Pittsburgh, PA
    title: Computer and Media Specialist
    dates: June 2014 to August 2017
    #description:
    #  Managed incident resolution and production system administration for the university community. Contributed to technology enhancements by implementing new hardware and software solutions.
    description-bullets:
      - bullet: Implemented and maintained Windows Deployment Services to replace legacy PC build processes, achieving a 50 percent reduction in build times for the university community.
      - bullet: Led the implementation of a Dell KACE environment to centralize software updates, service desk operations, and asset management across multiple departments.
      - bullet: Architected and implemented a modernized Pharos Print Management system that significantly reduced administrative and billing costs while improving the student end-user experience.
  - company: Saint Vincent College
    location: Latrobe, PA
    title: Senior Service Desk Technician
    dates: August 2010 to May 2014
    #description: 
    #  Leveraged ITIL best practices to deliver exceptional customer service. Managed incident resolution for faculty, staff, and students, restoring services within SLA guidelines.
    description-bullets:
      - bullet: Leveraged ITIL best practices to manage high-volume incident resolution, consistently restoring critical services within defined SLA guidelines for faculty, staff, and students.