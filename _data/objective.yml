section-title: Profile
content:  
  Technical leader with fifteen years of experience specializing in the architecture and delivery of secure cloud infrastructure. 
  Specialized in multi-tenant cloud architecture, security-by-default infrastructure, and platform enablement for large engineering organizations. 
  Expert-level proficiency in AWS, Microsoft Azure, and Infrastructure as Code. Proven record of leading high-ambiguity initiatives, defining long-term 
  technical direction, and creating force-multipliers to enable engineering organizations.