section-title: Profile
content:  
  Technical leader with fifteen years of experience specializing in the architecture and delivery of secure cloud infrastructure. 
  Leveraging a foundational background in Physics to apply first-principles thinking and analytical rigor to complex distributed systems. 
  Expert-level proficiency in AWS, Microsoft Azure, and Infrastructure as Code. Demonstrated success in roadmapping enterprise cloud platforms, 
  directing large-scale divestment initiatives, and establishing organizational training frameworks that drive technical excellence and stakeholder adoption.